name: Publish npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish with --dry-run'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Validate npm token
        if: ${{ !inputs.dry_run }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Missing npm publish token. Set repository secret NPM_TOKEN, or NODE_AUTH_TOKEN, to an npm automation/access token with publish permission."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build npm packages
        run: bun run build:npm

      - name: Verify wrapper
        run: node npm/run.js --version

      - name: Verify package contents
        run: |
          (cd npm && npm pack --dry-run)
          (cd npm/platforms/tap-darwin-arm64 && npm pack --dry-run)
          (cd npm/platforms/tap-darwin-x64 && npm pack --dry-run)
          (cd npm/platforms/tap-linux-x64 && npm pack --dry-run)

      - name: Publish packages
        run: bun run scripts/publish-npm.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN }}
          NPM_PUBLISH_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
